<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏈 NFL Clicker Game</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Russo+One&family=Orbitron:wght@700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Russo One', sans-serif;
            background: linear-gradient(135deg, #0a0a2e 0%, #1a0a3e 25%, #0d1b3e 50%, #0a2a4e 75%, #0a1a2e 100%);
            min-height: 100vh;
            overflow-x: hidden;
            color: #fff;
        }

        .stars {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .star {
            position: absolute;
            width: 2px; height: 2px;
            background: #fff;
            border-radius: 50%;
            animation: twinkle 3s infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.2; }
            50% { opacity: 1; }
        }

        .game-container {
            position: relative;
            z-index: 1;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            text-align: center;
            padding: 20px;
            margin-bottom: 20px;
        }

        .title {
            font-family: 'Orbitron', sans-serif;
            font-size: 3em;
            background: linear-gradient(90deg, #ff6b35, #ffd700, #ff6b35);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shineText 3s linear infinite;
            text-shadow: none;
            filter: drop-shadow(0 0 20px rgba(255, 215, 0, 0.3));
        }

        @keyframes shineText {
            0% { background-position: 0% center; }
            100% { background-position: 200% center; }
        }

        .subtitle {
            font-size: 1em;
            color: #aaa;
            margin-top: 5px;
        }

        .main-grid {
            display: grid;
            grid-template-columns: 1fr 2fr 1fr;
            gap: 20px;
            margin-top: 20px;
        }

        @media (max-width: 900px) {
            .main-grid {
                grid-template-columns: 1fr;
            }
        }

        .panel {
            background: linear-gradient(145deg, rgba(255,255,255,0.08), rgba(255,255,255,0.02));
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 20px;
            backdrop-filter: blur(10px);
        }

        .panel-title {
            font-size: 1.2em;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Score Display */
        .score-section {
            text-align: center;
            padding: 30px 20px;
            background: linear-gradient(145deg, rgba(255, 107, 53, 0.15), rgba(255, 215, 0, 0.1));
            border: 2px solid rgba(255, 215, 0, 0.3);
            border-radius: 20px;
            margin-bottom: 20px;
            position: relative;
            overflow: hidden;
        }

        .score-section::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: conic-gradient(from 0deg, transparent, rgba(255,215,0,0.05), transparent, rgba(255,107,53,0.05), transparent);
            animation: rotateBg 10s linear infinite;
        }

        @keyframes rotateBg {
            100% { transform: rotate(360deg); }
        }

        .score-label {
            font-size: 1em;
            color: #aaa;
            position: relative;
            z-index: 1;
        }

        .score-value {
            font-family: 'Orbitron', sans-serif;
            font-size: 3em;
            color: #ffd700;
            position: relative;
            z-index: 1;
            text-shadow: 0 0 30px rgba(255, 215, 0, 0.5);
            transition: transform 0.1s;
        }

        .score-value.bump {
            transform: scale(1.1);
        }

        .per-click {
            font-size: 0.9em;
            color: #ff6b35;
            margin-top: 5px;
            position: relative;
            z-index: 1;
        }

        .per-second {
            font-size: 0.9em;
            color: #4fc3f7;
            position: relative;
            z-index: 1;
        }

        /* Football Click Button */
        .click-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 400px;
        }

        .football-btn {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            position: relative;
            background: linear-gradient(145deg, #8B4513, #654321, #8B4513);
            box-shadow: 0 10px 40px rgba(139, 69, 19, 0.5),
                        inset 0 -5px 15px rgba(0,0,0,0.3),
                        inset 0 5px 15px rgba(255,255,255,0.1);
            transition: transform 0.1s, box-shadow 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 100px;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .football-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 15px 50px rgba(139, 69, 19, 0.7),
                        inset 0 -5px 15px rgba(0,0,0,0.3),
                        inset 0 5px 15px rgba(255,255,255,0.2);
        }

        .football-btn:active {
            transform: scale(0.95);
            box-shadow: 0 5px 20px rgba(139, 69, 19, 0.5),
                        inset 0 -2px 10px rgba(0,0,0,0.3);
        }

        .football-btn .ring {
            position: absolute;
            width: 220px;
            height: 220px;
            border: 3px solid rgba(255, 215, 0, 0.3);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        .football-btn .ring:nth-child(2) {
            width: 250px;
            height: 250px;
            border-color: rgba(255, 107, 53, 0.2);
            animation-delay: 0.5s;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.5; }
        }

        .click-text {
            position: absolute;
            font-weight: bold;
            font-size: 1.5em;
            color: #ffd700;
            pointer-events: none;
            animation: floatUp 1s ease-out forwards;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.8);
            z-index: 100;
        }

        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(-120px) scale(1.5); }
        }

        .emoji-burst {
            position: absolute;
            font-size: 2em;
            pointer-events: none;
            animation: burst 1s ease-out forwards;
            z-index: 100;
        }

        @keyframes burst {
            0% { opacity: 1; transform: translate(0, 0) scale(1) rotate(0deg); }
            100% { opacity: 0; transform: translate(var(--tx), var(--ty)) scale(0.3) rotate(360deg); }
        }

        /* Upgrades */
        .upgrade-item {
            background: linear-gradient(145deg, rgba(255,255,255,0.06), rgba(255,255,255,0.02));
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .upgrade-item:hover {
            background: linear-gradient(145deg, rgba(255,255,255,0.12), rgba(255,255,255,0.05));
            border-color: rgba(255, 215, 0, 0.3);
            transform: translateX(5px);
        }

        .upgrade-item.disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .upgrade-icon {
            font-size: 2em;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(145deg, rgba(255,215,0,0.2), rgba(255,107,53,0.1));
            border-radius: 12px;
            flex-shrink: 0;
        }

        .upgrade-info {
            flex: 1;
        }

        .upgrade-name {
            font-size: 0.9em;
            color: #ffd700;
        }

        .upgrade-desc {
            font-size: 0.7em;
            color: #888;
            margin-top: 2px;
        }

        .upgrade-cost {
            font-size: 0.8em;
            color: #4fc3f7;
            margin-top: 4px;
        }

        .upgrade-count {
            background: linear-gradient(145deg, #ff6b35, #ff8c5a);
            border-radius: 50%;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8em;
            flex-shrink: 0;
        }

        /* Achievements */
        .achievement {
            background: linear-gradient(145deg, rgba(255,255,255,0.04), rgba(255,255,255,0.01));
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 10px;
            padding: 10px;
            margin-bottom: 8px;
            text-align: center;
            transition: all 0.3s;
        }

        .achievement.unlocked {
            border-color: rgba(255, 215, 0, 0.4);
            background: linear-gradient(145deg, rgba(255,215,0,0.1), rgba(255,107,53,0.05));
            animation: unlockGlow 2s ease-out;
        }

        @keyframes unlockGlow {
            0% { box-shadow: 0 0 30px rgba(255, 215, 0, 0.5); }
            100% { box-shadow: none; }
        }

        .achievement-icon {
            font-size: 1.8em;
        }

        .achievement-name {
            font-size: 0.7em;
            color: #aaa;
            margin-top: 4px;
        }

        .achievement.locked .achievement-icon {
            filter: grayscale(1);
            opacity: 0.3;
        }

        .achievement.locked .achievement-name {
            color: #555;
        }

        /* Team Logos Section */
        .teams-section {
            margin-top: 20px;
        }

        .team-bonus {
            display: flex;
            align-items: center;
            gap: 10px;
            background: linear-gradient(145deg, rgba(255,255,255,0.06), rgba(255,255,255,0.02));
            border-radius: 12px;
            padding: 10px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.3s;
            border: 1px solid transparent;
        }

        .team-bonus:hover {
            border-color: rgba(255, 215, 0, 0.3);
            transform: scale(1.02);
        }

        .team-bonus.active {
            border-color: rgba(255, 215, 0, 0.5);
            background: linear-gradient(145deg, rgba(255,215,0,0.15), rgba(255,107,53,0.1));
        }

        .team-logo {
            font-size: 2em;
            width: 50px;
            text-align: center;
        }

        .team-info {
            flex: 1;
        }

        .team-name {
            font-size: 0.85em;
            color: #ffd700;
        }

        .team-bonus-text {
            font-size: 0.7em;
            color: #4fc3f7;
        }

        /* Stats Bar */
        .stats-bar {
            display: flex;
            justify-content: space-around;
            background: linear-gradient(145deg, rgba(255,255,255,0.05), rgba(255,255,255,0.02));
            border-radius: 15px;
            padding: 15px;
            margin-top: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5em;
            color: #ffd700;
        }

        .stat-label {
            font-size: 0.7em;
            color: #888;
            margin-top: 3px;
        }

        /* Level Progress */
        .level-bar {
            margin-top: 15px;
            background: linear-gradient(145deg, rgba(255,255,255,0.05), rgba(255,255,255,0.02));
            border-radius: 15px;
            padding: 15px;
        }

        .level-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .level-text {
            font-size: 1em;
            color: #ffd700;
        }

        .progress-bar {
            width: 100%;
            height: 12px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff6b35, #ffd700, #4fc3f7);
            border-radius: 10px;
            transition: width 0.5s;
            position: relative;
        }

        .progress-fill::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            animation: shimmer 2s infinite;
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        /* Particle effects */
        .particle {
            position: fixed;
            pointer-events: none;
            z-index: 999;
            border-radius: 50%;
            animation: particleFade 1s ease-out forwards;
        }

        @keyframes particleFade {
            0% { opacity: 1; transform: translate(0, 0) scale(1); }
            100% { opacity: 0; transform: translate(var(--px), var(--py)) scale(0); }
        }

        /* Combo indicator */
        .combo {
            text-align: center;
            margin-top: 15px;
            min-height: 40px;
        }

        .combo-text {
            font-size: 1.5em;
            font-family: 'Orbitron', sans-serif;
            background: linear-gradient(90deg, #ff6b35, #ffd700);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: comboPulse 0.5s ease-out;
        }

        @keyframes comboPulse {
            0% { transform: scale(2); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .multiplier-badge {
            display: inline-block;
            background: linear-gradient(145deg, #ff6b35, #ffd700);
            color: #000;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.8em;
            margin-top: 5px;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255,215,0,0.3);
            border-radius: 10px;
        }

        /* Notification */
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background: linear-gradient(145deg, #1a1a3e, #2a2a5e);
            border: 2px solid #ffd700;
            border-radius: 15px;
            padding: 15px 25px;
            z-index: 1000;
            animation: slideIn 0.5s ease-out, slideOut 0.5s ease-in 2.5s forwards;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.3);
        }

        @keyframes slideIn {
            0% { transform: translateX(100%); opacity: 0; }
            100% { transform: translateX(0); opacity: 1; }
        }

        @keyframes slideOut {
            0% { transform: translateX(0); opacity: 1; }
            100% { transform: translateX(100%); opacity: 0; }
        }

        .notification-title {
            color: #ffd700;
            font-size: 1em;
        }

        .notification-text {
            color: #aaa;
            font-size: 0.8em;
            margin-top: 5px;
        }

        /* Golden football animation */
        .golden-football {
            animation: goldenGlow 2s ease-in-out infinite alternate;
        }

        @keyframes goldenGlow {
            0% { filter: brightness(1) hue-rotate(0deg); }
            100% { filter: brightness(1.3) hue-rotate(20deg); }
        }

        .footer {
            text-align: center;
            padding: 20px;
            color: #444;
            font-size: 0.7em;
            margin-top: 30px;
        }
    </style>
</head>
<body>
    <div class="stars" id="stars"></div>

    <div class="game-container">
        <header>
            <div class="title">🏈 NFL CLICKER 🏈</div>
            <div class="subtitle">Зарабатывай очки, улучшай команду, стань легендой!</div>
        </header>

        <div class="score-section">
            <div class="score-label">⭐ ОЧКИ ФАНТАЗИ ⭐</div>
            <div class="score-value" id="score">0</div>
            <div class="per-click">👆 За клик: <span id="perClick">1</span> очков</div>
            <div class="per-second">⚡ В секунду: <span id="perSecond">0</span> очков</div>
        </div>

        <div class="main-grid">
            <!-- Left Panel - Teams -->
            <div>
                <div class="panel">
                    <div class="panel-title">🏟️ Команды-бонусы</div>
                    <div id="teamsContainer"></div>
                </div>
            </div>

            <!-- Center - Click Area -->
            <div>
                <div class="click-area">
                    <div style="position: relative;">
                        <button class="football-btn" id="footballBtn" onclick="clickFootball(event)">
                            <span class="ring"></span>
                            <span class="ring"></span>
                            🏈
                        </button>
                    </div>
                    <div class="combo" id="comboDisplay"></div>
                </div>

                <div class="level-bar">
                    <div class="level-header">
                        <span class="level-text" id="levelText">🏆 Уровень 1</span>
                        <span style="font-size: 0.8em; color: #888;" id="levelProgress">0 / 100</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill" id="progressFill" style="width: 0%"></div>
                    </div>
                </div>

                <div class="stats-bar">
                    <div class="stat-item">
                        <div class="stat-value" id="totalClicks">0</div>
                        <div class="stat-label">Кликов</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="totalEarned">0</div>
                        <div class="stat-label">Всего очков</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="maxCombo">0</div>
                        <div class="stat-label">Макс комбо</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="playTime">0:00</div>
                        <div class="stat-label">Время</div>
                    </div>
                </div>
            </div>

            <!-- Right Panel - Upgrades & Achievements -->
            <div>
                <div class="panel">
                    <div class="panel-title">🛒 Улучшения</div>
                    <div id="upgradesContainer"></div>
                </div>

                <div class="panel" style="margin-top: 15px;">
                    <div class="panel-title">🏅 Достижения</div>
                    <div id="achievementsContainer"></div>
                </div>
            </div>
        </div>

        <div class="footer">
            🏈 NFL Clicker Game — Нажимай на мяч и стань чемпионом! 🏆
        </div>
    </div>

    <script>
        // Game State
        let score = 0;
        let totalEarned = 0;
        let totalClicks = 0;
        let perClick = 1;
        let perSecond = 0;
        let level = 1;
        let combo = 0;
        let maxCombo = 0;
        let comboTimer = null;
        let lastClickTime = 0;
        let selectedTeam = null;
        let startTime = Date.now();
        let playTimer = null;

        // Teams with bonuses
        const teams = [
            { id: 'chiefs', name: 'Kansas City Chiefs', logo: '🔴', bonus: 'x1.5 к клику', mult: 1.5, cost: 500 },
            { id: 'eagles', name: 'Philadelphia Eagles', logo: '🦅', bonus: 'x2 к авто-доходу', mult: 2.0, cost: 2000 },
            { id: '49ers', name: 'San Francisco 49ers', logo: '⛏️', bonus: '+5 к клику', mult: 5, cost: 5000, flat: true },
            { id: 'cowboys', name: 'Dallas Cowboys', logo: '⭐', bonus: 'x3 к всему', mult: 3.0, cost: 15000 },
            { id: 'ravens', name: 'Baltimore Ravens', logo: '🐦‍⬛', bonus: 'x2.5 к комбо', mult: 2.5, cost: 8000 },
            { id: 'bills', name: 'Buffalo Bills', logo: '🦬', bonus: '+10 в секунду', mult: 10, cost: 10000, perSec: true },
        ];

        // Upgrades
        const upgrades = [
            { id: 'gloves', name: 'Перчатки QB', icon: '🧤', desc: '+1 к клику', cost: 15, effect: 'click', value: 1, bought: 0 },
            { id: 'helmet', name: 'Шлем MVP', icon: '⛑️', desc: '+2 к клику', cost: 50, effect: 'click', value: 2, bought: 0 },
            { id: 'cleats', name: 'Шипы Pro', icon: '👟', desc: '+5 к клику', cost: 200, effect: 'click', value: 5, bought: 0 },
            { id: 'jersey', name: 'Джерси Легенды', icon: '👕', desc: '+10 к клику', cost: 1000, effect: 'click', value: 10, bought: 0 },
            { id: 'trophy', name: 'Трофей Vincer', icon: '🏆', desc: '+25 к клику', cost: 5000, effect: 'click', value: 25, bought: 0 },
            { id: 'ring', name: 'Кольцо Чемпиона', icon: '💍', desc: '+50 к клику', cost: 25000, effect: 'click', value: 50, bought: 0 },
            { id: 'water', name: 'Gatorade', icon: '🥤', desc: '+1 в секунду', cost: 100, effect: 'sec', value: 1, bought: 0 },
            { id: 'coach', name: 'Тренер', icon: '👨‍💼', desc: '+3 в секунду', cost: 300, effect: 'sec', value: 3, bought: 0 },
            { id: 'stadium', name: 'Стадион', icon: '🏟️', desc: '+10 в секунду', cost: 1500, effect: 'sec', value: 10, bought: 0 },
            { id: 'broadcast', name: 'ТВ-контракт', icon: '📺', desc: '+25 в секунду', cost: 5000, effect: 'sec', value: 25, bought: 0 },
            { id: 'sponsor', name: 'Спонсор', icon: '💰', desc: '+50 в секунду', cost: 15000, effect: 'sec', value: 50, bought: 0 },
            { id: 'league', name: 'Лига', icon: '🌟', desc: '+100 в секунду', cost: 50000, effect: 'sec', value: 100, bought: 0 },
        ];

        // Achievements
        const achievements = [
            { id: 'first_click', name: 'Первый тачдаун!', icon: '🎯', condition: () => totalClicks >= 1, unlocked: false },
            { id: '100_clicks', name: '100 кликов!', icon: '💯', condition: () => totalClicks >= 100, unlocked: false },
            { id: '1000_clicks', name: '1K кликов!', icon: '🔥', condition: () => totalClicks >= 1000, unlocked: false },
            { id: '10k_score', name: '10K очков!', icon: '💰', condition: () => totalEarned >= 10000, unlocked: false },
            { id: '100k_score', name: '100K очков!', icon: '🤑', condition: () => totalEarned >= 100000, unlocked: false },
            { id: '1m_score', name: '1M очков!', icon: '👑', condition: () => totalEarned >= 1000000, unlocked: false },
            { id: 'combo_10', name: 'Комбо x10!', icon: '⚡', condition: () => maxCombo >= 10, unlocked: false },
            { id: 'combo_25', name: 'Комбо x25!', icon: '🌟', condition: () => maxCombo >= 25, unlocked: false },
            { id: 'level_5', name: 'Уровень 5', icon: '📈', condition: () => level >= 5, unlocked: false },
            { id: 'level_10', name: 'Уровень 10', icon: '🚀', condition: () => level >= 10, unlocked: false },
            { id: 'level_25', name: 'Уровень 25', icon: '🏆', condition: () => level >= 25, unlocked: false },
            { id: 'first_upgrade', name: 'Первое улучшение', icon: '🛒', condition: () => upgrades.some(u => u.bought > 0), unlocked: false },
        ];

        // Format numbers
        function formatNumber(num) {
            if (num >= 1e9) return (num / 1e9).toFixed(1) + 'B';
            if (num >= 1e6) return (num / 1e6).toFixed(1) + 'M';
            if (num >= 1e3) return (num / 1e3).toFixed(1) + 'K';
            return Math.floor(num).toString();
        }

        // Create stars background
        function createStars() {
            const container = document.getElementById('stars');
            for (let i = 0; i < 100; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.animationDelay = Math.random() * 3 + 's';
                star.style.animationDuration = (2 + Math.random() * 3) + 's';
                container.appendChild(star);
            }
        }

        // Click handler
        function clickFootball(event) {
            const now = Date.now();
            const timeDiff = now - lastClickTime;

            // Combo system
            if (timeDiff < 800) {
                combo++;
            } else {
                combo = 1;
            }
            lastClickTime = now;

            if (combo > maxCombo) maxCombo = combo;

            // Calculate points
            let points = perClick;

            // Combo bonus
            if (combo > 5) {
                let comboMult = 1 + (combo * 0.1);
                if (selectedTeam === 'ravens') comboMult *= 2.5;
                points = Math.floor(points * comboMult);
            }

            // Team multiplier
            if (selectedTeam) {
                const team = teams.find(t => t.id === selectedTeam);
                if (team && !team.flat && !team.perSec) {
                    points = Math.floor(points * team.mult);
                }
            }

            score += points;
            totalEarned += points;
            totalClicks++;

            // Visual feedback
            updateScore();
            spawnClickText(event, points);
            spawnEmojiBurst(event);
            spawnParticles(event);
            updateCombo();
            checkAchievements();
            updateLevel();
            updateUpgradesUI();
            updateTeamsUI();

            // Button animation
            const btn = document.getElementById('footballBtn');
            btn.style.transform = 'scale(0.9)';
            setTimeout(() => btn.style.transform = '', 100);

            // Reset combo timer
            clearTimeout(comboTimer);
            comboTimer = setTimeout(() => {
                combo = 0;
                updateCombo();
            }, 1500);
        }

        // Spawn floating click text
        function spawnClickText(event, points) {
            const text = document.createElement('div');
            text.className = 'click-text';
            text.textContent = '+' + formatNumber(points);
            text.style.left = (event.clientX - 30) + 'px';
            text.style.top = (event.clientY - 20) + 'px';
            document.body.appendChild(text);
            setTimeout(() => text.remove(), 1000);
        }

        // Spawn emoji burst
        function spawnEmojiBurst(event) {
            const emojis = ['🏈', '⭐', '💥', '🔥', '✨', '💫', '🎯', '🏆', '💰', '🌟'];
            const count = Math.min(3 + Math.floor(combo / 5), 8);

            for (let i = 0; i < count; i++) {
                const emoji = document.createElement('div');
                emoji.className = 'emoji-burst';
                emoji.textContent = emojis[Math.floor(Math.random() * emojis.length)];
                const angle = (Math.PI * 2 * i) / count;
                const distance = 50 + Math.random() * 80;
                emoji.style.left = event.clientX + 'px';
                emoji.style.top = event.clientY + 'px';
                emoji.style.setProperty('--tx', Math.cos(angle) * distance + 'px');
                emoji.style.setProperty('--ty', Math.sin(angle) * distance + 'px');
                document.body.appendChild(emoji);
                setTimeout(() => emoji.remove(), 1000);
            }
        }

        // Spawn particles
        function spawnParticles(event) {
            const colors = ['#ff6b35', '#ffd700', '#4fc3f7', '#ff4081', '#76ff03'];
            for (let i = 0; i < 8; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                const size = 3 + Math.random() * 8;
                particle.style.width = size + 'px';
                particle.style.height = size + 'px';
                particle.style.background = colors[Math.floor(Math.random() * colors.length)];
                particle.style.left = event.clientX + 'px';
                particle.style.top = event.clientY + 'px';
                const angle = Math.random() * Math.PI * 2;
                const distance = 30 + Math.random() * 60;
                particle.style.setProperty('--px', Math.cos(angle) * distance + 'px');
                particle.style.setProperty('--py', Math.sin(angle) * distance + 'px');
                document.body.appendChild(particle);
                setTimeout(() => particle.remove(), 1000);
            }
        }

        // Update score display
        function updateScore() {
            const scoreEl = document.getElementById('score');
            scoreEl.textContent = formatNumber(score);
            scoreEl.classList.add('bump');
            setTimeout(() => scoreEl.classList.remove('bump'), 100);

            document.getElementById('perClick').textContent = formatNumber(perClick);
            document.getElementById('perSecond').textContent = formatNumber(perSecond);
            document.getElementById('totalClicks').textContent = formatNumber(totalClicks);
            document.getElementById('totalEarned').textContent = formatNumber(totalEarned);
            document.getElementById('maxCombo').textContent = maxCombo;
        }

        // Update combo display
        function updateCombo() {
            const display = document.getElementById('comboDisplay');
            if (combo > 3) {
                display.innerHTML = `
                    <div class="combo-text">COMBO x${combo}!</div>
                    <div class="multiplier-badge">⚡ Множитель активен</div>
                `;
            } else {
                display.innerHTML = '';
            }
        }

        // Level system
        function updateLevel() {
            const threshold = level * 100 * Math.pow(1.5, level - 1);
            const progress = Math.min((totalEarned / threshold) * 100, 100);

            document.getElementById('progressFill').style.width = progress + '%';
            document.getElementById('levelProgress').textContent =
                formatNumber(totalEarned) + ' / ' + formatNumber(threshold);

            if (totalEarned >= threshold && level < 50) {
                level++;
                document.getElementById('levelText').textContent = '🏆 Уровень ' + level;
                showNotification('🎉 Новый уровень!', `Вы достигли уровня ${level}!`);
            }
        }

        // Buy upgrade
        function buyUpgrade(index) {
            const upgrade = upgrades[index];
            const cost = Math.floor(upgrade.cost * Math.pow(1.3, upgrade.bought));

            if (score >= cost) {
                score -= cost;
                upgrade.bought++;

                if (upgrade.effect === 'click') {
                    perClick += upgrade.value;
                } else {
                    perSecond += upgrade.value;
                }

                updateScore();
                updateUpgradesUI();
                checkAchievements();
                updateLevel();

                // Visual feedback
                showNotification('✅ ' + upgrade.name, `Улучшение куплено! (x${upgrade.bought})`);
            }
        }

        // Select team
        function selectTeam(teamId) {
            const team = teams.find(t => t.id === teamId);
            if (!team) return;

            if (score >= team.cost) {
                score -= team.cost;
                selectedTeam = teamId;
                team.cost = Math.floor(team.cost * 1.8);

                // Apply bonuses
                if (team.flat) {
                    perClick += team.mult;
                } else if (team.perSec) {
                    perSecond += team.mult;
                }

                updateScore();
                updateTeamsUI();
                updateUpgradesUI();
                showNotification('🏟️ ' + team.name, 'Команда активирована! Бонус получен!');
            }
        }

        // Render upgrades
        function renderUpgrades() {
            const container = document.getElementById('upgradesContainer');
            container.innerHTML = '';

            upgrades.forEach((upgrade, index) => {
                const cost = Math.floor(upgrade.cost * Math.pow(1.3, upgrade.bought));
                const canAfford = score >= cost;

                const div = document.createElement('div');
                div.className = 'upgrade-item' + (canAfford ? '' : ' disabled');
                div.onclick = () => buyUpgrade(index);
                div.innerHTML = `
                    <div class="upgrade-icon">${upgrade.icon}</div>
                    <div class="upgrade-info">
                        <div class="upgrade-name">${upgrade.name}</div>
                        <div class="upgrade-desc">${upgrade.desc}</div>
                        <div class="upgrade-cost">💰 ${formatNumber(cost)}</div>
                    </div>
                    <div class="upgrade-count">${upgrade.bought}</div>
                `;
                container.appendChild(div);
            });
        }

        function updateUpgradesUI() {
            renderUpgrades();
        }

        // Render teams
        function renderTeams() {
            const container = document.getElementById('teamsContainer');
            container.innerHTML = '';

            teams.forEach(team => {
                const isActive = selectedTeam === team.id;
                const canAfford = score >= team.cost || isActive;

                const div = document.createElement('div');
                div.className = 'team-bonus' + (isActive ? ' active' : '') + (canAfford ? '' : ' disabled');
                div.onclick = () => selectTeam(team.id);
                div.innerHTML = `
                    <div class="team-logo">${team.logo}</div>
                    <div class="team-info">
                        <div class="team-name">${team.name}</div>
                        <div class="team-bonus-text">${team.bonus} — 💰 ${formatNumber(team.cost)}</div>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        function updateTeamsUI() {
            renderTeams();
        }

        // Render achievements
        function renderAchievements() {
            const container = document.getElementById('achievementsContainer');
            container.innerHTML = '';

            achievements.forEach(ach => {
                const div = document.createElement('div');
                div.className = 'achievement' + (ach.unlocked ? ' unlocked' : ' locked');
                div.innerHTML = `
                    <div class="achievement-icon">${ach.icon}</div>
                    <div class="achievement-name">${ach.name}</div>
                `;
                container.appendChild(div);
            });
        }

        // Check achievements
        function checkAchievements() {
            let newUnlock = false;
            achievements.forEach(ach => {
                if (!ach.unlocked && ach.condition()) {
                    ach.unlocked = true;
                    newUnlock = true;
                    showNotification('🏅 Достижение!', ach.name);
                }
            });
            if (newUnlock) renderAchievements();
        }

        // Show notification
        function showNotification(title, text) {
            const existing = document.querySelector('.notification');
            if (existing) existing.remove();

            const notif = document.createElement('div');
            notif.className = 'notification';
            notif.innerHTML = `
                <div class="notification-title">${title}</div>
                <div class="notification-text">${text}</div>
            `;
            document.body.appendChild(notif);
            setTimeout(() => notif.remove(), 3000);
        }

        // Auto income
        function autoIncome() {
            if (perSecond > 0) {
                let income = perSecond;

                if (selectedTeam === 'eagles') {
                    income *= 2;
                }

                score += income;
                totalEarned += income;

                updateScore();
                checkAchievements();
                updateLevel();
                updateUpgradesUI();
                updateTeamsUI();
            }
        }

        // Play time
        function updatePlayTime() {
            const elapsed = Math.floor((Date.now() - startTime) / 1000);
            const minutes = Math.floor(elapsed / 60);
            const seconds = elapsed % 60;
            document.getElementById('playTime').textContent =
                minutes + ':' + (seconds < 10 ? '0' : '') + seconds;
        }

        // Init
        function init() {
            createStars();
            renderUpgrades();
            renderTeams();
            renderAchievements();
            updateScore();

            setInterval(autoIncome, 1000);
            setInterval(updatePlayTime, 1000);
            setInterval(() => {
                updateUpgradesUI();
                updateTeamsUI();
            }, 2000);
        }

        init();
    </script>
</body>
</html>
